<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketer Workspace</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ── Sidebar ───────────────────────────────────────────────── -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <p class="eyebrow">Marketer Workspace</p>
          <select id="brandId" class="brand-select"></select>
          <p id="brandDescription" class="brand-desc"></p>
        </div>

        <nav class="nav-group" aria-label="Sections">
          <div class="nav-section-label">Workspace</div>
          <a class="nav-link" href="#dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 11.5 12 4l9 7.5"></path>
              <path d="M6.5 10.5V20h11V10.5"></path>
            </svg>
            <span class="nav-label">Dashboard</span>
          </a>
          <a class="nav-link" href="#chat">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H10l-4 4v-4H7.5A2.5 2.5 0 0 1 5 12.5z"></path>
            </svg>
            <span class="nav-label">Chat</span>
          </a>
          <a class="nav-link" href="#knowledge-editor">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              <path d="M8 10h8"></path><path d="M8 14h5"></path>
            </svg>
            <span class="nav-label">Knowledge Editor</span>
          </a>
        </nav>

        <div class="sidebar-config">
          <label for="apiBase" class="config-label">API Base</label>
          <input id="apiBase" type="text" class="config-input" value="http://localhost:3001" />
        </div>
      </aside>

      <!-- ── View outlet (views mount here) ───────────────────────── -->
      <main class="main">
        <div id="view-outlet"></div>
      </main>

    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
