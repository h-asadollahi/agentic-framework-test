<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learned Routes Admin</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #1f2933;
        --muted: #52606d;
        --accent: #0067b8;
        --danger: #b42318;
        --border: #d9e2ec;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #eaf4ff 0%, var(--bg) 45%);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 12px;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 16px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      input, select, button {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 14px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button.secondary {
        background: #627d98;
      }
      button.danger {
        background: var(--danger);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
        font-size: 13px;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      .muted {
        color: var(--muted);
      }
      .status {
        margin-left: auto;
      }
      @media (max-width: 768px) {
        .row {
          flex-direction: column;
          align-items: stretch;
        }
        .status {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Learned Routes Admin</h1>
      <div class="sub">DB observability and route management console</div>

      <div class="panel">
        <div class="row">
          <input id="apiBase" placeholder="API Base URL" value="http://localhost:3001" style="min-width:260px" />
          <input id="token" placeholder="ADMIN_API_TOKEN (optional if IP allowlisted)" style="min-width:320px" />
          <button id="loadAll">Load</button>
          <button id="importBtn" class="secondary">Backfill JSON → DB</button>
          <button id="exportBtn" class="secondary">Export DB → JSON</button>
          <span class="status muted" id="status">Idle</span>
        </div>
      </div>

      <div class="panel">
        <div class="row">
          <input id="query" placeholder="Search capability/description" style="min-width:260px" />
          <select id="routeType">
            <option value="">All route types</option>
            <option value="api">api</option>
            <option value="sub-agent">sub-agent</option>
          </select>
          <button id="search">Search routes</button>
        </div>
      </div>

      <div class="panel">
        <h3>Route Stats</h3>
        <pre id="stats" class="muted">No data loaded.</pre>
      </div>

      <div class="panel">
        <h3>Routes</h3>
        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Capability</th>
                <th>Type</th>
                <th>Usage</th>
                <th>Target</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="routesTable"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h3>Event Timeline</h3>
        <pre id="events" class="muted">No events loaded.</pre>
      </div>

      <div class="panel">
        <h3>Run Summary</h3>
        <pre id="runs" class="muted">No run summary loaded.</pre>
      </div>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
